name: Desktop release

# Builds + signs + notarizes + publishes the macOS DMG/ZIP for an
# Open Knowledge release. After upload, promotes the GitHub Release
# from draft → published so it appears in the .atom feed.
#
# Triggers (2):
#   - repository_dispatch (event_type: desktop-release) — primary cascade
#     from release.yml (beta) and promote-stable.yml (stable). The
#     upstream creates the GitHub Release as --draft (so it stays out
#     of the .atom feed until the channel manifest is uploaded) and
#     dispatches this workflow with client_payload.{release_tag, ref}.
#     We do not use `release: published` for the cascade because the
#     upstream gh release create runs as GITHUB_TOKEN, and GitHub
#     suppresses workflow runs from GITHUB_TOKEN-authored release
#     events. repository_dispatch is the documented exemption.
#     See https://docs.github.com/en/actions/concepts/security/github_token.
#   - workflow_dispatch — manual recovery path for re-uploading a DMG
#     to an existing Release after a transient failure (e.g., a CI-only
#     fix landed after the tag was cut). Builds from the chosen ref
#     and uploads to the Release matching release_tag.
#
# What this workflow does: downloads the tagged ref, builds a signed +
# notarized + stapled + fuse-verified Universal DMG + Universal ZIP,
# and uploads `.dmg`, `.dmg.blockmap`, `.zip`, `.zip.blockmap`, and the
# channel-appropriate manifest (`latest-mac.yml` for stable releases,
# `beta-mac.yml` for `*-beta.*` prereleases) to the GitHub Release
# matching the tag. The channel is detected from the package version's
# prerelease tag in a step below. The upload is driven by
# `electron-builder --publish always` reading the
# `publish: [{ provider: github, owner: inkeep, repo: open-knowledge }]`
# block from `packages/desktop/electron-builder.yml`. After upload,
# the Promote step flips draft → published (and re-stamps --latest for
# the stable channel on the normal flow) via a single combined
# gh release edit PATCH — empirically atomic; GitHub evaluates the
# make_latest constraint against post-request state.
#
# Required secrets (identical shape to desktop-build.yml):
#   CSC_LINK / CSC_KEY_PASSWORD
#   APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD + APPLE_TEAM_ID
#     OR APPLE_API_KEY + APPLE_API_KEY_ID [+ APPLE_API_ISSUER]
#   GITHUB_TOKEN (auto-provided, contents:write scope) — used as GH_TOKEN
#     for electron-builder's GitHub publish.
#
# Unsigned mode is explicitly REJECTED here. auto-update refuses unsigned
# upgrades (Squirrel.Mac signature-verifies every update against the
# installed app's cert), so publishing unsigned would silently break
# real-world update cycles. Without CSC_LINK present, this workflow
# fails loudly in the signmode-detection step rather than building an
# unpublishable artifact.

on:
  # Primary cascade from release.yml (beta) and promote-stable.yml (stable).
  # Both fire repository_dispatch event_type=desktop-release with
  # client_payload.{release_tag, ref} after creating the GitHub Release
  # as --draft. We cannot use `release: published` for this cascade
  # because GitHub suppresses workflow runs from GITHUB_TOKEN-authored
  # release events; repository_dispatch is the documented exemption.
  repository_dispatch:
    types: [desktop-release]
  # Manual re-publish path: lets an operator upload a DMG to an existing
  # Release when the original cascade-triggered run failed (e.g., a
  # CI-only fix landed on `main` after the tag was cut). Builds from
  # the chosen ref (typically `main` with the fix) and uploads to the
  # Release matching release_tag. The dispatcher must ensure
  # `packages/desktop/package.json#version` at the chosen ref matches
  # release_tag (without the `v` prefix) — electron-builder picks the
  # upload target from package.json, not from this input.
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to upload DMG to (e.g. v0.3.0)"
        required: true
        type: string

permissions:
  # contents:write is required for electron-builder to upload release assets
  # via the GitHub API. The auto-provided GITHUB_TOKEN gets write scope with
  # this declaration; no separate PAT or App-token required.
  contents: write

# Concurrency mirrors desktop-build.yml's rationale — a mid-notarize cancel
# is costly (Apple's notary round-trip is 1-5 min and doesn't resume cleanly).
# Grouping on the release tag lets two back-to-back releases queue rather
# than race.
concurrency:
  group: desktop-release-${{ github.event.client_payload.release_tag || inputs.release_tag }}
  cancel-in-progress: false

jobs:
  build-and-publish-macos:
    # macos-26 = Apple Silicon (Tahoe) with Xcode 26.x preinstalled. Apple
    # Silicon is required for the Universal DMG lipo merge (arm64 + x64 →
    # universal) per parent SPEC D29. Xcode 26+ is required because
    # electron-builder compiles `build/okglass.icon` → `Assets.car` via
    # `actool`, which only ships with Xcode 26+.
    runs-on: macos-26
    # 75 min budget. A signed build + notary round-trip is ~20-30 min; the
    # build+publish step retries once on a transient failure (see below), so
    # the worst case is two full signed builds back-to-back. 75 min covers
    # that plus cold caches and notary queue spikes. desktop-build.yml has no
    # retry and stays at 45.
    timeout-minutes: 75
    steps:
      # On `repository_dispatch`, check out the ref supplied by the upstream
      # workflow via `client_payload.ref` — that's the exact commit
      # release.yml / promote-stable.yml resolved when cutting the tag, so
      # the bundled version + any CHANGELOG artifacts match the Release.
      #
      # On `workflow_dispatch`, check out the workflow ref the user dispatched
      # against (typically `main` with a CI fix). The dispatcher is responsible
      # for ensuring the resulting `packages/desktop/package.json#version`
      # matches `release_tag` (electron-builder uploads to the Release matching
      # package.json, not to `release_tag` directly).
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.client_payload.ref || github.ref }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: ".bun-version"

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-desktop-release-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-turbo-desktop-release-
            ${{ runner.os }}-turbo-desktop-

      - name: Install dependencies
        env:
          # Rebuild native modules against Electron's Node ABI — same as
          # desktop-build.yml.
          ELECTRON_SKIP_REBUILD: "0"
        run: bash scripts/bun-install-ci.sh

      # electron-builder.yml's `extraResources` rule copies from
      # `packages/cli/dist/public/`, which the CLI's `build:assets` populates
      # via `cp -r ../app/dist dist/public`. The CLI does not declare the
      # app as a workspace dep (app is private, and the CLI ships the
      # compiled bundle — not a package reference), so turbo's `^build`
      # runs them in parallel by default. Without explicit sequencing, cli's
      # `build:assets` races app's vite build and can fail (no `app/dist`
      # yet) or copy stale content. Use turbo's `--filter=@inkeep/...`
      # which DOES respect the `^build` graph (so server + core build
      # before app), and run the two filters in sequence to enforce
      # app → cli ordering.
      #
      # `bun run --filter=...` was the previous approach; it does not
      # honor turbo's dep graph (only runs the named package's `build`
      # script in isolation). After the workspace started shipping
      # `.mjs` builds for `@inkeep/open-knowledge-server` and
      # `@inkeep/open-knowledge-core` (specs/2026-04-24-desktop-packaging-
      # first-boot/), Vite's config loader in app-build resolves those
      # workspace deps via `exports.default → ./dist/index.mjs`. Without
      # an upstream `^build`, the `dist/` doesn't exist yet → "Failed to
      # resolve entry for package @inkeep/open-knowledge-server".
      # Detect channel from the release TAG (not package.json#version). Under
      # the zero-commit-bump cadence (release.yml header lines 7-10), the
      # tag is the only source of truth for the release's version — legacy
      # commits at the tagged SHA carry the cycle-base version (e.g.
      # `0.5.0-beta.5`), not the tag's version. Tag also drives manifest
      # selection (beta-mac.yml vs latest-mac.yml) for the stable-promotion
      # case where tag (`v0.4.0`) and on-disk package.json (`0.4.0-beta.N`)
      # diverge.
      #
      # Maps the version's prerelease tag to electron-builder's
      # `--config.publish.channel` (writes beta-mac.yml vs latest-mac.yml)
      # and `--config.publish.releaseType` (sets the GitHub Release
      # `prerelease` flag). Also emits `version` — used both by the on-disk
      # version override step below AND by the `--config.extraMetadata.version`
      # override on the electron-builder invocation.
      #
      # Fail-fast on anything other than `-beta.*` or plain semver —
      # `-rc.*` / `-canary.*` etc. would ship a manifest with a channel
      # name that electron-updater's GitHub provider treats as exact-match-
      # only (no cascade walk), producing a release that can't be picked up
      # by any client subscribed to a recognized channel.
      - name: Detect channel from release tag
        id: channel
        env:
          # repository_dispatch carries client_payload.release_tag; the
          # workflow_dispatch fallback supplies inputs.release_tag.
          RELEASE_TAG: ${{ github.event.client_payload.release_tag || inputs.release_tag }}
        run: |
          set -euo pipefail
          if [[ -z "${RELEASE_TAG:-}" ]]; then
            echo "::error::No release tag available (neither client_payload.release_tag nor inputs.release_tag is set). desktop-release.yml requires a tag to derive the version."
            exit 1
          fi
          # Strip leading `v` (electron-builder + npm want bare semver).
          VERSION="${RELEASE_TAG#v}"
          if [[ "$VERSION" == *-beta.* ]]; then
            {
              echo "channel=beta"
              echo "release_type=prerelease"
              echo "version=$VERSION"
            } >> "$GITHUB_OUTPUT"
            echo "::notice::Building BETA channel from tag $RELEASE_TAG"
          elif [[ "$VERSION" == *-beta ]]; then
            # The `*-beta.*` glob above requires a dot after `beta` (i.e.
            # `0.4.0-beta.0`, not `0.4.0-beta`). Trap the dotless form here
            # with a targeted message rather than letting it fall through
            # to the generic catch-all below — Changesets prerelease mode
            # always emits `-beta.N`, but a hand-edited tag could land here.
            echo "::error::Tag $RELEASE_TAG is missing the .N suffix — beta releases must be tagged -beta.N (e.g. -beta.0, -beta.1) so electron-updater's cascade walk can order them. See packages/desktop/README.md beta-channel runbook."
            exit 1
          elif [[ "$VERSION" == *-* ]]; then
            echo "::error::Unsupported prerelease ID in tag $RELEASE_TAG — only -beta.N is supported. See packages/desktop/README.md beta-channel runbook for the supported lifecycle."
            exit 1
          else
            {
              echo "channel=latest"
              echo "release_type=release"
              echo "version=$VERSION"
            } >> "$GITHUB_OUTPUT"
            echo "::notice::Building LATEST channel from tag $RELEASE_TAG"
          fi

      # PRD-6650: under the zero-commit-bump cadence (release.yml header
      # lines 7-10), workspace package.json files on disk at the tagged SHA
      # always lag the release tag — agents-private mirrors a cycle-base
      # version (e.g. `0.5.0-beta.5`) that `release.yml` overrides
      # transiently via `jq` before `bun changeset publish`. The Desktop
      # pipeline needs the same primitive: `tsdown` inlines
      # `import pkgJson from "../package.json"` into
      # `packages/cli/dist/constants-*.mjs` at Build time, and
      # `packages/cli/build:skill-asset` composes + copies both
      # `packages/server/assets/skills/{project,discovery}/SKILL.md` into
      # `packages/cli/dist/assets/...`. Both bake in BEFORE
      # `electron-builder --config.extraMetadata.version` runs, so the
      # runtime override cannot reach them; the override has to land here,
      # before Build.
      #
      # Mirrors release.yml:191-216 exactly (same `jq` loop over the five
      # fixed-group packages + same `sed` regex against SKILL.md) so the
      # two workflows stay in lockstep — future cadence changes touch both
      # places the same way.
      - name: Override fixed-group versions on disk (zero-commit-bump cadence)
        env:
          VERSION: ${{ steps.channel.outputs.version }}
        run: |
          set -euo pipefail
          for pkg in cli core server app desktop; do
            f="packages/${pkg}/package.json"
            jq --arg v "$VERSION" '.version=$v' "$f" > "${f}.tmp"
            mv "${f}.tmp" "$f"
          done
          for skill in packages/server/assets/skills/project/SKILL.md \
                       packages/server/assets/skills/discovery/SKILL.md; do
            sed -i'.bak' -E "s/^([[:space:]]+version:[[:space:]]+\")[^\"]+(\".*)$/\1${VERSION}\2/" "$skill"
            rm -f "${skill}.bak"
          done
          echo "All fixed-group package.json files + both skill bundles' metadata.version now at ${VERSION} (in-memory only)."

      - name: Build workspace (produces packages/cli/dist/public for extraResources)
        run: |
          bunx turbo run build --filter=@inkeep/open-knowledge-app
          bunx turbo run build --filter=@inkeep/open-knowledge

      - name: Detect signing mode
        id: signmode
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
        # AC5 + SPEC §13 STOP_IF: unsigned mode is rejected. auto-update
        # refuses unsigned upgrades (signature verification by Squirrel.Mac
        # fails on cert mismatch), so publishing an unsigned DMG would
        # silently break the real-world update path. Fail loud instead.
        run: |
          if [[ -n "${CSC_LINK}" ]]; then
            echo "mode=signed" >> "$GITHUB_OUTPUT"
            echo "::notice::Signing creds present — running signed build with electron-builder --publish always."
          else
            echo "::error::Cannot publish unsigned release — CSC_LINK is not set. auto-update requires signed DMGs."
            exit 1
          fi

      # Materialize App Store Connect API key (Option B notarization shape).
      # @electron/notarize's NotaryToolApiKeyCredentials types `appleApiKey`
      # as a filesystem path to the .p8 file — not the PEM contents. CI
      # runners have no .p8 on disk; the secret holds the key material.
      # Decode here and rewrite APPLE_API_KEY to point at the materialized
      # file. No-op when APPLE_API_KEY is unset (Option A password creds
      # path runs instead). Accepts either raw PEM or base64.
      - name: Materialize App Store Connect API key
        env:
          APPLE_API_KEY_VALUE: ${{ secrets.APPLE_API_KEY }}
        run: |
          if [[ -z "$APPLE_API_KEY_VALUE" ]]; then
            echo "::notice::APPLE_API_KEY secret not set — Option A (APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD + APPLE_TEAM_ID) path will run if those creds are present. afterSign.mjs fails loud on partial creds."
            exit 0
          fi
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          if [[ "$APPLE_API_KEY_VALUE" == *"BEGIN PRIVATE KEY"* ]] || [[ "$APPLE_API_KEY_VALUE" == *"BEGIN EC PRIVATE KEY"* ]]; then
            printf '%s' "$APPLE_API_KEY_VALUE" > "$KEY_PATH"
          else
            if ! printf '%s' "$APPLE_API_KEY_VALUE" | base64 -d > "$KEY_PATH" 2>/dev/null; then
              echo "::error::APPLE_API_KEY is neither a PEM nor valid base64. Re-export from App Store Connect → Users and Access → Integrations → Team Keys, then either paste the .p8 contents directly OR run 'base64 -i AuthKey_XXXX.p8 | pbcopy' and paste."
              exit 1
            fi
          fi
          if ! head -c 5 "$KEY_PATH" | grep -q "^-----"; then
            echo "::error::Materialized .p8 does not begin with '-----'. Secret was likely double-encoded or corrupted in transit."
            exit 1
          fi
          chmod 600 "$KEY_PATH"
          echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"
          echo "::notice::APPLE_API_KEY materialized to $KEY_PATH"

      # Force-install both darwin-arm64 and darwin-x64 prebuilt binaries for
      # @napi-rs/keyring before electron-builder's universal merge runs. Bun
      # under workspace conditions only installs the host-arch optionalDependency
      # (cpu constraint), so the darwin-x64 binary is missing on an arm64
      # runner. @electron/universal's lipo merge then either errors or hangs
      # waiting for x64 inputs that don't exist.
      - name: Force-install darwin keyring prebuilds for universal merge
        working-directory: packages/desktop
        run: node scripts/prepare-universal.mjs

      - name: Build + sign + notarize + publish DMG/ZIP
        # electron-builder picks up CSC_LINK / CSC_KEY_PASSWORD from env +
        # signs. afterSign.mjs picks up APPLE_* + notarizes + staples +
        # fuse-verifies. `--publish always` makes electron-builder upload
        # the artifacts (.dmg, .dmg.blockmap, .zip, .zip.blockmap, and the
        # channel-appropriate manifest — `latest-mac.yml` or `beta-mac.yml`
        # depending on `--config.publish.channel` set below from the
        # detected channel) to the GitHub Release matching the current tag
        # — via the publish block in electron-builder.yml (A1) + GH_TOKEN
        # in env. No separate `gh release upload` step needed.
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # APPLE_API_KEY itself is NOT set here — the materialize step above
          # writes the .p8 to disk and pushes APPLE_API_KEY=<path> into
          # $GITHUB_ENV so it flows through to this step. Setting it again
          # at step-level would override that path with the raw secret value
          # and break @electron/notarize's path-based contract.
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          # GH_TOKEN is what electron-builder's GitHub publisher reads.
          # The auto-provided GITHUB_TOKEN with contents:write scope
          # (declared above) is sufficient for uploading assets to a
          # Release that already exists (created by release.yml's
          # `gh release create`). F14 audit: no App-token required.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: packages/desktop
        run: |
          # extraMetadata.version override: kept as defense-in-depth so the
          # Desktop's app.getVersion() / Info.plist / DMG filename / manifest
          # `version` all agree with the tag even if the on-disk override
          # step above is skipped, dropped, or partially applied. Under the
          # zero-commit-bump cadence (release.yml header lines 7-10) the
          # on-disk versions ALWAYS lag the release tag — agents-private
          # never commits a bumped version — so this override is never a
          # no-op for the Desktop's own metadata. But it does NOT reach
          # the CLI bundle's compile-time-inlined PACKAGE_VERSION or the
          # bundled SKILL.md asset's metadata.version; those are baked in
          # at Build time, so the workspace-wide on-disk override step
          # above is what makes them match the tag. See PRD-6650.
          #
          # Retry the build+publish once on failure. The two observed
          # stuck-draft causes were both transient and un-retried: a bare EOF
          # fetching the Electron runtime zip during packaging (app-builder's
          # DownloadNoRetry path aborts on a single dropped connection), and a
          # 403 from uploads.github.com mid-publish after a fully successful
          # sign+notarize (concurrent-upload throttling). Either aborts the run
          # before the Promote step and orphans the draft release. Re-running
          # the whole invocation is idempotent: electron-builder deletes then
          # re-uploads same-named assets on republish, so a partial asset set
          # left by a failed first attempt is overwritten, not duplicated. A
          # persistent (non-transient) failure still exits non-zero after the
          # final attempt and lands in the Warn-on-stuck-draft path + the
          # scheduled draft-release janitor.
          set -uo pipefail
          attempt=1
          max_attempts=2
          while true; do
            echo "::group::electron-builder publish attempt ${attempt}/${max_attempts}"
            if bun run build:desktop && bunx electron-builder --mac --publish always \
              --config.extraMetadata.version=${{ steps.channel.outputs.version }} \
              --config.publish.channel=${{ steps.channel.outputs.channel }} \
              --config.publish.releaseType=${{ steps.channel.outputs.release_type }}; then
              echo "::endgroup::"
              echo "electron-builder succeeded on attempt ${attempt}."
              break
            fi
            echo "::endgroup::"
            if [ "${attempt}" -ge "${max_attempts}" ]; then
              echo "::error::electron-builder failed after ${max_attempts} attempts."
              exit 1
            fi
            backoff=$((attempt * 30))
            echo "::warning::electron-builder attempt ${attempt} failed; retrying in ${backoff}s (transient sign/notarize/upload/download flakes are retried once)."
            sleep "${backoff}"
            attempt=$((attempt + 1))
          done

      # Closes the publish-window race: release.yml / promote-stable.yml
      # create the GitHub Release as --draft so it stays out of the .atom
      # feed until the channel manifest (beta-mac.yml / latest-mac.yml) is
      # uploaded. This step flips the draft to published once the upload
      # above has succeeded. Channel-mirror invariant: see
      # packages/desktop/src/main/auto-updater.ts:336-356.
      - name: Promote draft release to published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.client_payload.release_tag || inputs.release_tag }}
          CHANNEL: ${{ steps.channel.outputs.channel }}
        run: |
          set -euo pipefail
          # --latest is gated on the trigger event. On the cascade flow
          # (repository_dispatch from release.yml / promote-stable.yml),
          # this run is for the freshly-published stable, so re-stamping
          # --latest is correct. On the manual recovery flow
          # (workflow_dispatch), the operator may be re-running for an
          # OLDER tag (e.g., re-uploading a DMG for v0.4.0 after a later
          # v0.5.0 already became Latest). Unconditional --latest there
          # silently steals the Latest badge from the newer release.
          # Skip --latest on workflow_dispatch; the operator can
          # `gh release edit ${RELEASE_TAG} --latest` manually if they
          # want to re-claim the badge.
          #
          # Combined --draft=false [--latest] in one PATCH is empirically
          # atomic — GitHub evaluates the make_latest constraint against
          # the post-request state, so the draft→published flip and
          # Latest stamp succeed in a single call. Beta channel never
          # sets --latest.
          if [[ "$CHANNEL" == "latest" && "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]]; then
            gh release edit "$RELEASE_TAG" --draft=false --latest
            echo "Promoted ${RELEASE_TAG} to published (draft=false, latest=true; channel=${CHANNEL})."
          elif [[ "$CHANNEL" == "latest" ]]; then
            gh release edit "$RELEASE_TAG" --draft=false
            echo "Promoted ${RELEASE_TAG} to published (draft=false, latest=NOT re-stamped because event=workflow_dispatch; channel=${CHANNEL}). Operator: run 'gh release edit ${RELEASE_TAG} --latest' to re-claim Latest if intended."
          else
            gh release edit "$RELEASE_TAG" --draft=false
            echo "Promoted ${RELEASE_TAG} to published (draft=false, latest=false; channel=${CHANNEL})."
          fi

      # Announce STABLE releases to Slack. Gated on channel=latest so betas
      # stay silent — every *-beta.N cut also flows through this job (on
      # channel=beta) and must not post (see Detect channel step above).
      # Placed AFTER the promote step and gated on success() so we only
      # announce a release that is actually published (draft=false), never a
      # stuck draft. Skipped on the workflow_dispatch recovery flow so a
      # manual DMG re-upload for an older tag does not re-announce it.
      #
      # The webhook URL lives in the SLACK_WEBHOOK_URL secret on
      # inkeep/open-knowledge. When it is absent (a fork, or before the
      # secret is provisioned) the step no-ops cleanly; a Slack delivery
      # error is downgraded to a ::warning:: — the release is "done" once
      # published, so the announcement is strictly best-effort and must
      # never fail an otherwise-successful release.
      - name: Announce stable release to Slack
        if: success() && steps.channel.outputs.channel == 'latest' && github.event_name != 'workflow_dispatch'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RELEASE_TAG: ${{ github.event.client_payload.release_tag || inputs.release_tag }}
          VERSION: ${{ steps.channel.outputs.version }}
        run: |
          set -euo pipefail
          if [[ -z "${SLACK_WEBHOOK_URL:-}" ]]; then
            echo "::notice::SLACK_WEBHOOK_URL not set — skipping Slack announcement for ${RELEASE_TAG}."
            exit 0
          fi
          RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}"
          # Build the Block Kit payload with jq so $VERSION / $RELEASE_URL are
          # JSON-escaped — a stray quote in a tag would otherwise corrupt the
          # body. `text` is the notification/a11y fallback Slack recommends
          # alongside blocks; the header is plain_text, the section mrkdwn.
          payload="$(jq -n \
            --arg version "$VERSION" \
            --arg release_url "$RELEASE_URL" \
            '{
              text: ("OpenKnowledge \($version) released — " + $release_url),
              blocks: [
                { type: "header",
                  text: { type: "plain_text", text: "🎉 OpenKnowledge \($version) released", emoji: true } },
                { type: "section",
                  text: { type: "mrkdwn",
                          text: ("*<\($release_url)|Release notes & downloads>*") } }
              ]
            }')"
          # The failing curl sits in an `if` condition, which `set -e` does
          # not treat as fatal — a Slack outage routes to the else/warning
          # and the step still exits 0.
          if curl -sS --fail -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL"; then
            echo "Posted stable-release announcement for ${RELEASE_TAG} to Slack."
          else
            echo "::warning::Slack announcement failed for ${RELEASE_TAG} (release is published; notification is best-effort)."
          fi

      # Announce STABLE releases to Discord
      - name: Announce stable release to Discord
        if: success() && steps.channel.outputs.channel == 'latest' && github.event_name != 'workflow_dispatch'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.client_payload.release_tag || inputs.release_tag }}
          VERSION: ${{ steps.channel.outputs.version }}
        run: |
          set -euo pipefail
          if [[ -z "${DISCORD_WEBHOOK_URL:-}" ]]; then
            echo "::notice::DISCORD_WEBHOOK_URL not set — skipping Discord announcement for ${RELEASE_TAG}."
            exit 0
          fi
          RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}"
          NOTES="$(gh release view "$RELEASE_TAG" --json body --jq '.body' 2>/dev/null || true)"
          NOTES_LIMIT=3500
          if [[ "${#NOTES}" -gt "$NOTES_LIMIT" ]]; then
            NOTES="${NOTES:0:$NOTES_LIMIT}…"
          fi
          payload="$(jq -n \
            --arg version "$VERSION" \
            --arg release_url "$RELEASE_URL" \
            --arg notes "$NOTES" \
            '{
              username: "OpenKnowledge",
              allowed_mentions: { parse: [] },
              content: ("🎉 OpenKnowledge \($version) released — " + $release_url),
              embeds: [
                { title: ("OpenKnowledge \($version) released"),
                  url: $release_url,
                  color: 3638527,
                  description: (
                    (if ($notes | length) > 0 then ($notes + "\n\n") else "" end)
                    + "[Release notes & downloads](\($release_url))"
                  ) }
              ]
            }')"
          if curl -sS --fail -X POST -H 'Content-Type: application/json' --data "$payload" "$DISCORD_WEBHOOK_URL"; then
            echo "Posted stable-release announcement for ${RELEASE_TAG} to Discord."
          else
            echo "::warning::Discord announcement failed for ${RELEASE_TAG} (release is published; notification is best-effort)."
          fi

      # Lightweight discoverability for stuck-draft state when the promote
      # step (or the build/upload step before it) fails. NOT a substitute
      # for the full paging-design observability deferred in the PR body —
      # this is a zero-cost log marker that makes stuck drafts findable via
      # GitHub Actions log search using the STUCK-DRAFT tag. Operators
      # bisecting a missing release can grep workflow logs for the tag,
      # then run the recovery command in the message.
      - name: Warn on stuck draft
        if: failure()
        env:
          RELEASE_TAG: ${{ github.event.client_payload.release_tag || inputs.release_tag }}
          CHANNEL: ${{ steps.channel.outputs.channel }}
        run: |
          # Recovery command mirrors the Promote step's combined PATCH shape
          # (--draft=false [--latest]) — empirically atomic per GitHub's
          # post-state evaluation of make_latest.
          if [[ "$CHANNEL" == "latest" ]]; then
            RECOVERY="gh release edit ${RELEASE_TAG} --draft=false --latest"
          else
            RECOVERY="gh release edit ${RELEASE_TAG} --draft=false"
          fi
          echo "::warning::STUCK-DRAFT: Release ${RELEASE_TAG} may be stuck as draft (channel=${CHANNEL}). Recovery: ${RECOVERY}"

      # Defense-in-depth: even though electron-builder --publish always
      # does the upload, upload the artifacts to the workflow's run log
      # too for a 14-day audit trail. Downstream consumers can download
      # the signed artifacts from either the Release itself or this
      # workflow artifact — useful when bisecting a botched upload.
      - name: Upload DMG/ZIP audit artifact
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: open-knowledge-macos-release-${{ github.event.client_payload.release_tag || inputs.release_tag }}
          path: |
            packages/desktop/dist-desktop/*.dmg
            packages/desktop/dist-desktop/*.dmg.blockmap
            packages/desktop/dist-desktop/*-mac.zip
            packages/desktop/dist-desktop/*-mac.zip.blockmap
            packages/desktop/dist-desktop/*-mac.yml
          retention-days: 14
          if-no-files-found: error
